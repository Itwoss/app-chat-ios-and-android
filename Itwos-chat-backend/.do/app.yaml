name: itwos-chat-backend
services:
  - name: backend
    github:
      repo: Itwoss/Itwos-chat-backend
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm install
    run_command: node server.js
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs  # Adjust based on your needs (basic-xxs, basic-xs, basic-s, etc.)
    http_port: 5001
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
    # CRITICAL: Environment variables for backend
    # These are available at RUN_TIME (unlike frontend which needs BUILD_TIME)
    envs:
      - key: PORT
        value: "5001"
        scope: RUN_TIME
      - key: NODE_ENV
        value: "production"
        scope: RUN_TIME  # CRITICAL: Must be 'production' for cookies to work
      - key: FRONTEND_URL
        value: "https://app.itwos.store"
        scope: RUN_TIME
      - key: BACKEND_URL
        value: "https://api.itwos.store"
        scope: RUN_TIME
      - key: MONGODB_URI
        value: "mongodb+srv://itwos-admin:Ry19e2CUXEsnYGqa@itwos.ggpbl8w.mongodb.net/?appName=itwos"
